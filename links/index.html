<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Links</title>

  <link rel="stylesheet" href="../style.css?v=6">
</head>

<body class="links-page">

  <main>

    <section class="join-section">
      <img
  class="links-mascot"
  src="../icons/may-sticker.png?v=2"
  alt="May mascot"
>
      <div class="links-top-ornament">
  <span>✦ ✦ ✦</span>
  <span>♡</span>
  <span>✦ ✦ ✦</span>
</div>

      <div class="join-title">
        <span class="join-decor">✦ ✦</span>
        <span class="join-text">CLICK TO JOIN</span>
        <span class="join-decor">✦ ✦</span>
      </div>

      <div class="platform-grid">

        <a
          class="platform-card"
          href="https://chaturbate.com/in/?tour=APi5&campaign=vGyXo&track=default&room=succubus_room"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="platform-logo"
            src="../icons/chaturbate.svg?v=21"
            alt="Chaturbate"
          >
        </a>

        <a
          class="platform-card"
          href="https://stripchat.com/may_marsy/follow-me"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="platform-logo"
            src="../icons/stripchat.svg"
            alt="Stripchat"
          >
        </a>

        <a
          class="platform-card"
          href="https://www.camsoda.com/succubusroom?id=succubusroom"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="platform-logo"
            src="../icons/camsoda.svg"
            alt="CamSoda"
          >
        </a>

        <a
          class="platform-card lower"
          href="https://www.instagram.com/maymarsycb/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="platform-logo"
            src="../icons/instagram.svg"
            alt="Instagram"
          >
        </a>

        <a
          class="platform-card lower"
          href="https://www.reddit.com/user/AmesMay/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="platform-logo"
            src="../icons/reddit.svg"
            alt="Reddit"
          >
        </a>

      </div>

      <a
        class="wishlist-button"
        href="https://lovense.com/wish-list/nx93"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="wishlist-icon">♡</span>
        <span>LOVENSE WISH LIST</span>
      </a>

    </section>

  </main>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#15030f");
      tg.setBackgroundColor("#070105");
    }
  </script>

</body>
</html>
