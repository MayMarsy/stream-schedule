<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0208" />
  <title>July Stream Schedule</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div class="page-frame" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hero">
      <div class="winged-heart" aria-hidden="true">
        <span class="wing">╲╱</span>
        <span class="heart">♡</span>
        <span class="wing wing-right">╲╱</span>
      </div>

      <h1>July Stream Schedule</h1>
      <p>All times are automatically converted<br />to your local timezone</p>
    </header>

    <section class="timezone-card" aria-live="polite">
      <span class="timezone-icon">🌐</span>
      <span id="timezone">Detecting your timezone…</span>
    </section>

    <section id="schedule" class="schedule-list" aria-label="Stream schedule"></section>

    <section class="join-section">
      <div class="join-title">
        <span>✦</span>
        <span>CLICK TO JOIN</span>
        <span>✦</span>
      </div>

      <div class="platform-grid">
        <a class="platform-card" href="https://example.com/chaturbate" target="_blank" rel="noopener noreferrer">
          <div class="brand-mark brand-chaturbate">Chaturbate</div>
          <div class="platform-name">Chaturbate</div>
          <div class="mini-ornament">→ ♡ ←</div>
        </a>

        <a class="platform-card" href="https://example.com/stripchat" target="_blank" rel="noopener noreferrer">
          <div class="brand-mark brand-stripchat">◉</div>
          <div class="platform-name">Stripchat</div>
          <div class="mini-ornament">→ ♡ ←</div>
        </a>

        <a class="platform-card" href="https://example.com/camsoda" target="_blank" rel="noopener noreferrer">
          <div class="brand-mark brand-camsoda">CamSoda</div>
          <div class="platform-name">Camsoda</div>
          <div class="mini-ornament">→ ♡ ←</div>
        </a>

        <a class="platform-card lower" href="https://example.com/instagram" target="_blank" rel="noopener noreferrer">
          <div class="brand-mark social-mark">◎</div>
          <div class="platform-name">Instagram</div>
          <div class="mini-ornament">→ ♡ ←</div>
        </a>

        <a class="platform-card lower" href="https://example.com/reddit" target="_blank" rel="noopener noreferrer">
          <div class="brand-mark social-mark">●</div>
          <div class="platform-name">Reddit</div>
          <div class="mini-ornament">→ ♡ ←</div>
        </a>
      </div>

      <a class="wishlist-button" href="https://example.com/lovense" target="_blank" rel="noopener noreferrer">
        <span class="wishlist-icon">♡</span>
        <span>LOVENSE WISH LIST</span>
      </a>
    </section>
  </main>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
